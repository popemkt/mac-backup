name: Validate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nix:
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Verify generated release sources
        run: nix run .#github-sources -- verify
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate formatting and evaluation
        run: |
          nix develop -c shellcheck .githooks/pre-commit scripts/github-sources
          nix develop -c actionlint
          nix develop -c sh -c 'find . -name "*.nix" -not -path "./.git/*" -print0 | xargs -0 nixfmt --check'
          nix develop -c statix check .
          nix develop -c deadnix --fail --exclude ./_sources/generated.nix .
          nix flake check --no-build

      - name: Build flake checks
        run: nix flake check
